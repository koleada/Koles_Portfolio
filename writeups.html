<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kole's Cyber Portfolio</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/writeups.css" />
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <script src="scripts/writeups.js" defer></script>
  </head>
  <body>
    <div class="header">
      <div class="hTop">
        <a id="hLogo" href="index.html">
          <img src="images/coolLogoGood.jpg" alt="optiWeb Labs logo"
            id="logoImg">
          <h1 id="cName">Kole's Portfolio</h1>
        </a>
        <div class="hLinks">
          <a id="blogLink" class="toplink" href="writeups.html">Write Ups</a>
        </div>
      </div>
      <div class="hContent">

        <div class="blogHeader">
          <h1 class="blogTitle">Write-Ups</h1>
          <h3 class="blogDescription">A collection of write-ups to showcase the things I've been working on, to keep documentation on these things, and hopefully to provide value to others.</h3>
        </div>
        <div class="searchPost">
          <div class="blogSearchWrap"> 
            <span class="searchPrompt">></span>
            <input id="blogSearch" class="blogSearch" type="text"
              placeholder="Search write ups..." />
          </div>
        <div id="blogGrid" class="blogGrid"></div>
        </div>
 
      </div>

      <div id="footer">
        <div id="companyStuff">
          <div>Hudson Valley, NY</div>
          <div>© 2026 Kole. All rights reserved.</div>
        </div>

        <div id="myLinks">
          <a href="https://www.linkedin.com/in/kole-niznik/"
            class="socialLinks">LinkedIn</a>
          <a href="https://github.com/koleada?tab=repositories"
            class="socialLinks">Github</a>
        </div>
      </div>
    </body>
  </html>
